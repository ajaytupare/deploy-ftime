<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Tags Task</title>
</head>
<body>
    <h4 align="center">Create a Web Page Using Image,Audio,Video, and Iframe Tags</h4>
    <!-- <h4>Image</h4> -->
    <table>
        <thead>
            <tr>
                <th>Image</th><th>Audio</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="demo.jpg" alt="Sample Image">
                </td>
                <td>
                    <audio controls>
                        <source src="Interstellar Official Soundtrack  Cornfield Chase  Hans Zimmer  WaterTower.mp3" type="audio/mp3">
                    </audio>
                </td>
            </tr>
        </tbody>
    </table>
    <hr>
    <h4>Video</h4>
    <video controls width="400">
        <source src="animatedvideo.mp4" type="video/mp4">
    </video>
    <hr>
    <h4>Iframe</h4>
    <iframe src="https://www.youtube.com/embed/3eSKo66Um9k?si=9_SUEnW3ks6CGDJf" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen?" frameborder="0"></iframe>
</body>
</html>
